<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Favorite Developer</title>
    <style>
        :root {
            --primary-pink: #ff75a0;
            --soft-purple: #845ef7;
            --glass-bg: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0c29; /* خلفية ليلية تبرز الألوان */
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* حاوية التصميم - Glassmorphism */
        .container {
            position: relative;
            padding: 3rem;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: scale(1.02);
        }

        /* الجملة المزخرفة بتأثير الشادو المتوهج */
        h1 {
            font-size: 2.5rem;
            color: #fff;
            margin: 0;
            text-shadow: 0 0 10px var(--primary-pink), 0 0 20px var(--soft-purple);
            letter-spacing: 1px;
        }

        /* إضافة لمسة برمجية بسيطة */
        .code-text {
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            margin-top: 15px;
            display: block;
        }

        /* حركة القلوب البرمجية */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>كُـلّ عَـام وأنتِ الخَـيـر لِكُـلّ عَـام 🌸</h1>
        
    </div>

    <script>
        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            // تنويع بين القلوب ورموز برمجية بسيطة
            const types = ['❤', '✨', '{ }', 'CSS', 'JS'];
            particle.innerText = types[Math.floor(Math.random() * types.length)];
            
            particle.style.left = Math.random() * 100 + "vw";
            particle.style.top = "-5vh";
            particle.style.color = ["#ff75a0", "#845ef7", "#00ffcc"][Math.floor(Math.random() * 3)];
            particle.style.fontSize = Math.random() * 20 + 10 + "px";
            particle.style.duration = Math.random() * 3 + 2 + "s";
            particle.style.opacity = Math.random();
            
            document.body.appendChild(particle);

            particle.animate([
                { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
                { transform: `translateY(110vh) rotate(720deg)`, opacity: 0 }
            ], {
                duration: Math.random() * 3000 + 3000,
                easing: 'linear'
            }).onfinish = () => particle.remove();
        }

        setInterval(createParticle, 200);
    </script>
</body>
</html>
