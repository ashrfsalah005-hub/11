صار وتدلل يا بطل، شلتلك الجزء الخاص بالموسيقى والأيقونة مالتها، وحافظتلك على فخامة التصميم والـ Particles (النقاط المتطايرة) اللي تنطي لمسة برمجية راقية.

تفضل الكود الصافي والمعدل:

HTML
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إهداء خاص</title>
    <style>
        /* خلفية متدرجة فخمة ومتحركة */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #1a0021, #c9184a, #000000);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* كرت التصميم الزجاجي */
        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 70px 50px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            position: relative;
            z-index: 10;
            transition: transform 0.4s ease;
        }

        .glass-card:hover {
            transform: translateY(-10px);
        }

        /* النص الأساسي مع التنوين والزخرفة */
        .main-text {
            font-size: 3.2rem;
            color: #ffffff;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(255, 71, 126, 0.7);
            line-height: 1.8;
        }

        /* تمييز كلمة عامٍ */
        .highlight {
            color: #ffb3c1;
            text-decoration: underline wavy #ff4d6d;
            text-underline-offset: 10px;
        }

        /* تأثير النجوم/الجزيئات في الخلفية */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="glass-card">
        <div class="main-text">
            كُـلّ <span class="highlight">عَـامٍ</span> <br>
            وأنتِ الخَـيـر لِكُـلّ <span class="highlight">عَـامٍ</span> 🌸
        </div>
    </div>

    <script>
        // كود الجزيئات البرمجية المتساقطة بنعومة
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random();
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particlesArray = [];
            for (let i = 0; i < 150; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        init();
        animate();
    </script>
</body>
</html>
</html>
